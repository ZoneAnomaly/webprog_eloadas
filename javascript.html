<header class="text-white text-center  shadow-sm">
    <nav class="navbar ">
        <form class="container-fluid justify-content-start">
            <a href="index.html" class="btn btnfo btn-outline-secondary">Vissza a főoldalra</a>

        <h1 class="display-5 fw-bold pagetitle">Web programozás - 1 Előadás Házi feladat</h1>

    </div>

<div class="container tablecon">
    <h1 class="text-center mb-4 ">Helyi Mozi Kezelő (JavaScript CRUD)</h1>
    <hr>

    <div class="card shadow-sm mb-5">
        <div class="card-body">
            <form onsubmit="event.preventDefault(); onFormSubmit();" autocomplete="off">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Mozi ID*</label>
                        <input type="number" class="form-control" id="moziId">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Mozi Neve*</label>
                        <span class="validation-error hide" id="nameError">Kötelező!</span>
                        <input type="text" class="form-control" id="moziNev">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Város</label>
                        <input type="text" class="form-control" id="moziVaros">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Férőhely</label>
                        <input type="number" class="form-control" id="moziFerohely">
                    </div>
                    <div class="col-12 text-end">
                        <input type="submit" value="Mentés" class="btn btn-success text-dark">
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover shadow-sm" id="moziLista">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Név</th>
                    <th>Város</th>
                    <th>Férőhely</th>
                    <th>Műveletek</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>


</div>

</body>
