<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fetch API CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">
</head>

<header class="text-white text-center  shadow-sm">
        <nav class="navbar ">
            <form class="container-fluid justify-content-start">
                <a href="index.html" class="btn btnfo btn-outline-secondary">Vissza a főoldalra</a>
            </form>
        </nav>
        <div class="container">
            
            <h1 class="display-5 fw-bold">Web programozás - 1 Előadás Házi feladat</h1>
        </div>
</header>

<body>
    

    <div class="container tablecon text-center">
        <h2 class="mb-4">Fetch API - Mozi Adatbázis (Szerver oldali)</h2>
        <p id="message" class="text-danger fw-bold"></p>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h3 id="addedit" class="mb-3">Új mozi hozzáadása</h3>
                <form id="moziForm">
                    <div class="row g-2">
                        <div class="col-md-2">
                            <input type="number" id="id" class="form-control" placeholder="Mozi ID" required>
                        </div>
                        <div class="col-md-3">
                            <input type="text" id="nev" class="form-control" placeholder="Mozi neve" required>
                        </div>
                        <div class="col-md-3">
                            <input type="text" id="varos" class="form-control" placeholder="Város" required>
                        </div>
                        <div class="col-md-2">
                            <input type="number" id="ferohely" class="form-control" placeholder="Férőhely" required>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-primary w-100">Mentés</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <table class="table table-bordered table-hover shadow-sm bg-white">
            <thead class="table-dark">
                <tr>
                    <th>Id</th>
                    <th>Név</th>
                    <th>Város</th>
                    <th>Férőhely</th>
                    <th width="180">Műveletek</th>
                </tr>
            </thead>
            <tbody id="moziTable">
            </tbody>
        </table>
    </div>

    <script src="fetchapi_script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
